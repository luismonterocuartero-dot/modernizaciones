version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: svehi-postgres
    environment:
      POSTGRES_DB: svehidb
      POSTGRES_USER: svehi
      POSTGRES_PASSWORD: svehi2024
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svehi -d svehidb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
