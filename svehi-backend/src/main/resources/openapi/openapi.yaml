openapi: 3.0.3
info:
  title: SVEHI Modernización API
  description: API para el sistema de Gestión de Vehículos e Históricos (SVEHI)
  version: 1.0.0
  contact:
    name: Arquitectura SVEHI
servers:
  - url: http://localhost:8080/svehi
    description: Local Server

tags:
  - name: Usuarios
    description: Gestión de usuarios y permisos
  - name: Maestros
    description: Tablas maestras (Marcas, Modelos, etc)
  - name: Auth
    description: Autenticación de usuarios
  - name: Vehiculos
    description: Gestión del parque de vehículos

paths:
  /v1/auth/login:
    post:
      tags:
        - Auth
      summary: Iniciar sesión
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequestVO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioVO'
        '401':
          description: Unauthorized

  /v1/auth/login-cert:
    post:
      tags:
        - Auth
      summary: Iniciar sesión con certificado @firma
      operationId: loginWithCertificate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCertificateRequestVO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioVO'
        '401':
          description: Unauthorized (Usuario no encontrado o inactivo)

  /v1/usuarios:
    get:
      tags:
        - Usuarios
      summary: Listar usuarios
      operationId: getUsuarios
      parameters:
        - name: nif
          in: query
          description: Filtrar por NIF
          schema:
            type: string
        - name: nombre
          in: query
          description: Filtrar por nombre (like)
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageUsuarioVO'
    post:
      tags:
        - Usuarios
      summary: Crear usuario
      operationId: createUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioVO'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioVO'
        '400':
          description: Bad Request
        '409':
          description: Conflict

  /v1/usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener usuario por ID
      operationId: getUsuarioById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioVO'
        '404':
          description: Not Found
    
    put:
      tags:
        - Usuarios
      summary: Actualizar usuario
      operationId: updateUsuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioVO'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioVO'
        '404':
          description: Not Found
    
    delete:
      tags:
        - Usuarios
      summary: Desactivar usuario
      operationId: deleteUsuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found

