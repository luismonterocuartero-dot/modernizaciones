components:
  schemas:
    VehiculoVO:
      type: object
      required:
        - matricula
        - marcaId
        - modelo
      properties:
        id:
          type: integer
          format: int64
        matricula:
          type: string
        marcaId:
          type: integer
          format: int64
        marcaNombre:
          type: string
        modelo:
          type: string
        tipoVehiculo:
          type: string
        bastidor:
          type: string
        fechaMatriculacion:
          type: string
          format: date
        activo:
          type: boolean
          default: true

    PageVehiculoVO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/VehiculoVO'
        totalElements:
          type: integer
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer
    UsuarioVO:
      type: object
      required:
        - nif
        - nombre
        - apellido1
        - perfilId
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
        nif:
          type: string
          pattern: '^\d{8}[A-Z]$'
        nombre:
          type: string
        apellido1:
          type: string
        apellido2:
          type: string
        email:
          type: string
          format: email
        activo:
          type: boolean
          default: true
        perfilId:
          type: integer
          format: int64
        perfil:
          $ref: '#/components/schemas/PerfilVO'
        servicioAdscrito:
          type: string
    
    PerfilVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        activo:
          type: boolean
    
    MarcaVO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        activo:
          type: boolean

    PageUsuarioVO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UsuarioVO'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    LoginRequestVO:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

