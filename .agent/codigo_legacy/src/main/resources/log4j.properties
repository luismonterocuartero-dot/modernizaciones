# Global logging configuration
log4j.rootLogger=${log4j.root.level}, stdout, file

# Rutas de logado
#log4j.logger.trewa=ERROR
#log4j.logger.es.guadaltel.trewa.ext=ERROR
#log4j.logger.com.gtel.agenda=ERROR
#log4j.logger.com.gtel.struts=ERROR
#log4j.logger.es.guadaltel.juntadeandalucia.pida=INFO

# Console output...
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
log4j.appender.stdout.layout.ConversionPattern=[SVEHI] %d{[yyyy-MM-dd HH:mm:ss,SSS]} %X{username} %5p (%F:%L) - %m%n

# File file...
log4j.appender.file=org.apache.log4j.RollingFileAppender
#log4j.appender.file=org.apache.log4j.DailyRollingFileAppender
log4j.appender.file.File=${log4j.file.path}
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d{[yyyy-MM-dd HH:mm:ss,SSS]} %X{username} %5p (%F:%L) - %m%n
log4j.appender.file.MaxFileSize=1MB
log4j.appender.file.DatePattern='.'yyyy-MM-dd
#log4j.appender.file.MaxBackupIndex=8


log4j.category.profiling=ERROR

